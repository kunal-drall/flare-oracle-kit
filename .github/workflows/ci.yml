name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (SDK)
        run: pnpm --filter @flare-oracle-kit/sdk test

      - name: Test (Contracts)
        run: pnpm --filter @flare-oracle-kit/contracts test

      - name: Build (SDK)
        run: pnpm --filter @flare-oracle-kit/sdk build

      - name: Build (Contracts)
        run: pnpm --filter @flare-oracle-kit/contracts build
